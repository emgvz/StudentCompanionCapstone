server: 
  port: 8080 
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/student_companion
    username: root
    password: 1234
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    sql:
      init:
        mode: always
  servlet:
    multipart:
      max-file-size: 15MB
      max-request-size: 20MB
  config:
    import: optional:classpath:secrets.properties

groq:
  api:
    key: ${groq.api.key:your-api-key-here}
