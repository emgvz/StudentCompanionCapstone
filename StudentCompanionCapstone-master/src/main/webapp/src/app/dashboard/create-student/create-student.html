<div class="container-center">

  <div class="login-card">

    <!-- LEFT SIDE -->
    <div class="left">

      <img src="SCLogo.png" class="logo" />

      <h1>Create Student</h1>

      <div class="divider"></div>

      <p>
        Add and manage your student profile easily.
      </p>

    </div>

    <!-- RIGHT SIDE -->
    <div class="right">

      <h2>Student Details</h2>

      <form (ngSubmit)="submit()">

        <!-- NAME -->
        <label>Name</label>

        <input
          type="text"
          [(ngModel)]="student.name"
          name="name"
          placeholder="Enter student name"
          required
        />

        <!-- AGE -->
        <label>Age</label>

        <input
          type="number"
          [(ngModel)]="student.age"
          name="age"
          placeholder="Enter age"
          required
        />

        <!-- BUTTON -->
        <button type="submit">
          Save Student
        </button>

      </form>

    </div>

  </div>

</div>
